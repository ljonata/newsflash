<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Floor is Lava</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a0a00;
            font-family: Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            user-select: none;
        }

        /* HUD */
        #hud {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.75);
            padding: 6px 12px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 200; height: 36px;
        }
        #hud-left { display: flex; align-items: center; gap: 14px; font-size: 13px; }
        .hud-user { color: gold; font-weight: bold; }
        .hud-score { color: #ff6600; }
        .hud-hi { color: #ffcc00; }
        .hud-dist { color: #aaa; }
        #hud-right a {
            color: #aaa; font-size: 13px; text-decoration: none; cursor: pointer; margin-left: 12px;
        }
        #hud-right a:hover { color: #fff; }

        /* Canvas */
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* Start / Game Over overlay */
        #overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 300;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center;
        }
        #overlay.hidden { display: none; }
        #overlay h1 {
            font-size: 48px; color: #ff4400;
            text-shadow: 0 0 20px #ff4400, 0 0 40px #ff2200;
            margin-bottom: 8px;
        }
        #overlay .subtitle {
            color: #ff9944; font-size: 18px; margin-bottom: 30px;
        }
        #overlay .final-score {
            color: #ffcc00; font-size: 28px; font-weight: bold; margin-bottom: 8px;
        }
        #overlay .hi-score {
            color: #aaa; font-size: 16px; margin-bottom: 30px;
        }
        #overlay .play-btn {
            padding: 16px 48px; font-size: 22px; font-weight: bold;
            background: linear-gradient(135deg, #ff4400, #ff6600);
            color: #fff; border: none; border-radius: 10px;
            cursor: pointer; transition: transform 0.2s;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        #overlay .play-btn:hover { transform: scale(1.08); }
        #overlay .play-btn:active { transform: scale(0.96); }
        #overlay .controls-hint {
            color: #666; font-size: 13px; margin-top: 20px;
        }
        #overlay .controls-hint span { color: #999; }
        .back-link {
            color: #555; font-size: 13px; text-decoration: none;
            margin-top: 16px; display: inline-block;
        }
        .back-link:hover { color: #999; }

        /* Mobile controls */
        #mobile-controls {
            display: none;
            position: fixed; bottom: 20px; left: 0; right: 0;
            z-index: 150;
            justify-content: center; gap: 16px;
        }
        .mob-btn {
            width: 70px; height: 70px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 14px;
            color: #fff; font-size: 28px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .mob-btn:active { background: rgba(255,255,255,0.25); }
        .mob-btn-jump {
            width: 100px; height: 70px; font-size: 16px; font-weight: bold;
        }

        @media (pointer: coarse) {
            #mobile-controls { display: flex; }
        }
    </style>
</head>
<body>

<div id="hud">
    <div id="hud-left">
        <span class="hud-user" id="d-name"></span>
        <span class="hud-score">Score: <b id="d-score">0</b></span>
        <span class="hud-hi">Best: <b id="d-hi">0</b></span>
    </div>
    <div id="hud-right">
        <a href="/games/01/home.html">Home</a>
        <a onclick="handleLogout()">Logout</a>
    </div>
</div>

<canvas id="game"></canvas>

<div id="mobile-controls">
    <div class="mob-btn" ontouchstart="mobileLeft=true" ontouchend="mobileLeft=false">&#9664;</div>
    <div class="mob-btn mob-btn-jump" ontouchstart="mobileJump()" >JUMP</div>
    <div class="mob-btn" ontouchstart="mobileRight=true" ontouchend="mobileRight=false">&#9654;</div>
</div>

<div id="overlay">
    <h1>Floor is Lava</h1>
    <div class="subtitle">Jump from block to block — don't fall!</div>
    <div class="final-score" id="ov-score" style="display:none;"></div>
    <div class="hi-score" id="ov-hi" style="display:none;"></div>
    <button class="play-btn" id="play-btn" onclick="startGame()">Play</button>
    <div class="controls-hint">
        <span>&#8592; &#8594;</span> Move &nbsp;|&nbsp; <span>Space / &#8593;</span> Jump
    </div>
    <a class="back-link" href="/games/01/home.html">&#8592; Back to Games</a>
</div>

<script>
// ─── Auth ───
const userStr = localStorage.getItem('user');
const token = localStorage.getItem('token');
let currentUser = null;
if (userStr) {
    try { currentUser = JSON.parse(userStr); } catch(e) {}
}
if (!currentUser || !token) {
    window.location.href = '/games/01/login.html';
}
document.getElementById('d-name').textContent = currentUser.name;

function handleLogout() {
    localStorage.removeItem('user');
    localStorage.removeItem('token');
    window.location.href = '/games/01/login.html';
}

// ─── Canvas Setup ───
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const BASE_W = 480;
const BASE_H = 640;
let scale = 1;

function resize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    scale = Math.min(w / BASE_W, h / BASE_H);
    canvas.width = Math.floor(BASE_W * scale);
    canvas.height = Math.floor(BASE_H * scale);
    ctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', resize);
resize();

// ─── Constants ───
const GRAVITY = 1800;
const JUMP_VEL = -620;
const MOVE_SPEED = 220;
const SCROLL_SPEED_BASE = 80;
const SCROLL_SPEED_INCR = 3;       // speed increase per 10 score
const BLOCK_W = 70;
const BLOCK_H = 18;
const PLAYER_W = 16;
const PLAYER_H = 24;
const LAVA_SURFACE_H = 30;         // lava wave height area at bottom
const BLOCK_GAP_MIN = 40;
const BLOCK_GAP_MAX = 90;
const BLOCK_SPACING_X_MIN = -20;
const BLOCK_SPACING_X_MAX = 140;

// ─── Game State ───
let playing = false;
let gameOver = false;
let score = 0;
let hiScore = parseInt(localStorage.getItem('lavaHiScore') || '0');
let scrollSpeed = SCROLL_SPEED_BASE;
let scrollY = 0;

let player = { x: 0, y: 0, vy: 0, vx: 0, onGround: false, facing: 1, frame: 0, frameTime: 0 };
let blocks = [];
let lavaY = 0;          // world-Y of lava surface (scrolls down from bottom)
let particles = [];
let lavaPhase = 0;

// Mobile input
let mobileLeft = false;
let mobileRight = false;
function mobileJump() { if (playing && player.onGround) player.vy = JUMP_VEL; }

// ─── Input ───
const keys = {};
document.addEventListener('keydown', e => {
    keys[e.code] = true;
    if ((e.code === 'Space' || e.code === 'ArrowUp') && playing && player.onGround) {
        player.vy = JUMP_VEL;
    }
    if ((e.code === 'Space' || e.code === 'Enter') && !playing) {
        startGame();
    }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── Block Generation ───
function spawnInitialBlocks() {
    blocks = [];
    // Starting platform — wider and centered
    blocks.push({ x: BASE_W / 2 - 50, y: BASE_H - 120, w: 100, h: BLOCK_H, type: 'stone' });

    let lastX = BASE_W / 2 - 50;
    let lastY = BASE_H - 120;

    for (let i = 0; i < 20; i++) {
        const gapY = BLOCK_GAP_MIN + Math.random() * (BLOCK_GAP_MAX - BLOCK_GAP_MIN);
        const offsetX = BLOCK_SPACING_X_MIN + Math.random() * (BLOCK_SPACING_X_MAX - BLOCK_SPACING_X_MIN);
        const dir = Math.random() < 0.5 ? -1 : 1;
        let nx = lastX + offsetX * dir;
        const bw = 50 + Math.random() * 40;
        // Keep blocks on screen
        nx = Math.max(10, Math.min(BASE_W - bw - 10, nx));
        const ny = lastY - gapY;

        const types = ['stone', 'stone', 'stone', 'brick', 'brick', 'mossy'];
        blocks.push({ x: nx, y: ny, w: bw, h: BLOCK_H, type: types[Math.floor(Math.random() * types.length)] });
        lastX = nx;
        lastY = ny;
    }
}

function spawnBlockAbove() {
    const topBlock = blocks[blocks.length - 1];
    const gapY = BLOCK_GAP_MIN + Math.random() * (BLOCK_GAP_MAX - BLOCK_GAP_MIN);
    const offsetX = BLOCK_SPACING_X_MIN + Math.random() * (BLOCK_SPACING_X_MAX - BLOCK_SPACING_X_MIN);
    const dir = Math.random() < 0.5 ? -1 : 1;
    let nx = topBlock.x + offsetX * dir;
    const bw = 45 + Math.random() * 45;
    nx = Math.max(10, Math.min(BASE_W - bw - 10, nx));
    const ny = topBlock.y - gapY;

    const types = ['stone', 'stone', 'brick', 'brick', 'mossy', 'cracked'];
    blocks.push({ x: nx, y: ny, w: bw, h: BLOCK_H, type: types[Math.floor(Math.random() * types.length)] });
}

// ─── Drawing Helpers ───

// Lava rendering
function drawLava(camY) {
    const screenLavaTop = lavaY - camY;
    if (screenLavaTop > BASE_H) return;

    const top = Math.max(0, screenLavaTop);
    // Lava body
    const grd = ctx.createLinearGradient(0, top, 0, BASE_H);
    grd.addColorStop(0, '#ff4400');
    grd.addColorStop(0.3, '#ff2200');
    grd.addColorStop(0.7, '#cc1100');
    grd.addColorStop(1, '#880800');
    ctx.fillStyle = grd;
    ctx.fillRect(0, top, BASE_W, BASE_H - top);

    // Lava surface waves
    ctx.fillStyle = '#ff6600';
    for (let x = 0; x < BASE_W; x += 6) {
        const wave = Math.sin((x * 0.05) + lavaPhase) * 4 + Math.sin((x * 0.1) + lavaPhase * 1.5) * 2;
        ctx.fillRect(x, top + wave - 2, 6, 4);
    }
    // Bright highlights
    ctx.fillStyle = '#ffaa22';
    for (let x = 0; x < BASE_W; x += 14) {
        const wave = Math.sin((x * 0.07) + lavaPhase * 0.8 + 2) * 3;
        ctx.fillRect(x, top + wave, 4, 2);
    }

    // Lava glow on bottom of screen
    const glowGrd = ctx.createLinearGradient(0, BASE_H - 60, 0, BASE_H);
    glowGrd.addColorStop(0, 'rgba(255,68,0,0)');
    glowGrd.addColorStop(1, 'rgba(255,68,0,0.15)');
    ctx.fillStyle = glowGrd;
    ctx.fillRect(0, BASE_H - 60, BASE_W, 60);
}

// Block rendering with pixel-art textures
function drawBlock(b, camY) {
    const sx = b.x;
    const sy = b.y - camY;
    if (sy > BASE_H + 20 || sy < -40) return;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(sx + 3, sy + 3, b.w, b.h);

    // Block body
    const colors = {
        stone:   { top: '#888', face: '#777', dark: '#555', accent: '#999' },
        brick:   { top: '#b44', face: '#933', dark: '#722', accent: '#c66' },
        mossy:   { top: '#5a5', face: '#494', dark: '#363', accent: '#6b6' },
        cracked: { top: '#776', face: '#665', dark: '#443', accent: '#887' },
    };
    const c = colors[b.type] || colors.stone;

    // Top face (lighter)
    ctx.fillStyle = c.top;
    ctx.fillRect(sx, sy, b.w, 4);

    // Front face
    ctx.fillStyle = c.face;
    ctx.fillRect(sx, sy + 4, b.w, b.h - 4);

    // Left edge dark
    ctx.fillStyle = c.dark;
    ctx.fillRect(sx, sy + 4, 3, b.h - 4);

    // Right edge highlight
    ctx.fillStyle = c.accent;
    ctx.fillRect(sx + b.w - 2, sy, 2, b.h);

    // Pixel detail: cracks or moss dots
    ctx.fillStyle = c.dark;
    if (b.type === 'brick') {
        // Brick lines
        for (let bx = sx + 10; bx < sx + b.w - 5; bx += 18) {
            ctx.fillRect(bx, sy + 6, 1, b.h - 8);
        }
        ctx.fillRect(sx + 4, sy + Math.floor(b.h / 2) + 2, b.w - 8, 1);
    } else if (b.type === 'mossy') {
        ctx.fillStyle = '#2a2';
        for (let i = 0; i < 4; i++) {
            const mx = sx + 5 + ((i * 17 + b.x) % (b.w - 10));
            ctx.fillRect(mx, sy + 2, 2, 2);
        }
    } else if (b.type === 'cracked') {
        ctx.fillStyle = '#332';
        ctx.fillRect(sx + b.w * 0.3, sy + 3, 1, b.h - 5);
        ctx.fillRect(sx + b.w * 0.3 + 1, sy + 5, 3, 1);
        ctx.fillRect(sx + b.w * 0.6, sy + 2, 1, b.h - 6);
    } else {
        // Stone speckles
        for (let i = 0; i < 3; i++) {
            const mx = sx + 6 + ((i * 23 + b.x * 3) % (b.w - 12));
            const my = sy + 5 + ((i * 7) % (b.h - 7));
            ctx.fillRect(mx, my, 2, 1);
        }
    }
}

// Player rendering — pixel-art character
function drawPlayer(camY) {
    const sx = Math.floor(player.x);
    const sy = Math.floor(player.y - camY);
    const f = player.facing;

    // Jump/run frame
    const isJumping = !player.onGround;
    const runFrame = Math.floor(player.frame) % 4;

    // Leg offsets for animation
    let legL = 0, legR = 0;
    if (isJumping) {
        legL = -2; legR = 2;
    } else if (Math.abs(player.vx) > 10) {
        const cycle = [0, 2, 0, -2];
        legL = cycle[runFrame];
        legR = cycle[(runFrame + 2) % 4];
    }

    // Shadow on ground
    if (player.onGround) {
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(sx - 1, sy + PLAYER_H, PLAYER_W + 2, 2);
    }

    // Legs (dark pants)
    ctx.fillStyle = '#335';
    ctx.fillRect(sx + 2, sy + 16 + legL, 5, 8);      // left leg
    ctx.fillRect(sx + 9, sy + 16 + legR, 5, 8);       // right leg
    // Shoes
    ctx.fillStyle = '#543';
    ctx.fillRect(sx + 2, sy + 22 + legL, 5, 2);
    ctx.fillRect(sx + 9, sy + 22 + legR, 5, 2);

    // Body (shirt)
    ctx.fillStyle = '#e44';
    ctx.fillRect(sx + 1, sy + 8, 14, 9);
    // Shirt detail
    ctx.fillStyle = '#c33';
    ctx.fillRect(sx + 7, sy + 8, 1, 9);

    // Arms
    const armSwing = isJumping ? -3 : (Math.abs(player.vx) > 10 ? legR : 0);
    ctx.fillStyle = '#da8';
    ctx.fillRect(sx - 2, sy + 9 + armSwing, 3, 7);       // left arm
    ctx.fillRect(sx + 15, sy + 9 - armSwing, 3, 7);       // right arm

    // Head
    ctx.fillStyle = '#da8';
    ctx.fillRect(sx + 2, sy, 12, 9);
    // Hair
    ctx.fillStyle = '#532';
    ctx.fillRect(sx + 2, sy, 12, 3);
    if (f > 0) {
        ctx.fillRect(sx + 2, sy + 2, 2, 3);
    } else {
        ctx.fillRect(sx + 12, sy + 2, 2, 3);
    }
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx + (f > 0 ? 5 : 4), sy + 4, 3, 2);
    ctx.fillRect(sx + (f > 0 ? 10 : 9), sy + 4, 3, 2);
    ctx.fillStyle = '#222';
    ctx.fillRect(sx + (f > 0 ? 6 : 4), sy + 4, 1, 2);
    ctx.fillRect(sx + (f > 0 ? 11 : 9), sy + 4, 1, 2);
    // Mouth
    ctx.fillStyle = '#a86';
    ctx.fillRect(sx + 6, sy + 7, 4, 1);
}

// Particles
function spawnLavaParticle(x, y) {
    for (let i = 0; i < 5; i++) {
        particles.push({
            x: x + Math.random() * 20 - 10,
            y: y,
            vx: (Math.random() - 0.5) * 100,
            vy: -100 - Math.random() * 150,
            life: 0.5 + Math.random() * 0.5,
            maxLife: 0.5 + Math.random() * 0.5,
            size: 2 + Math.random() * 3,
        });
    }
}

function drawParticles(camY, dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 400 * dt;
        p.life -= dt;
        if (p.life <= 0) { particles.splice(i, 1); continue; }

        const alpha = p.life / p.maxLife;
        const r = Math.floor(255 * alpha);
        const g = Math.floor(100 * alpha);
        ctx.fillStyle = `rgba(${r},${g},0,${alpha})`;
        ctx.fillRect(p.x, p.y - camY, p.size, p.size);
    }
}

// Background — dark gradient with floating embers
let embers = [];
function initEmbers() {
    embers = [];
    for (let i = 0; i < 30; i++) {
        embers.push({
            x: Math.random() * BASE_W,
            y: Math.random() * BASE_H,
            speed: 10 + Math.random() * 30,
            size: 1 + Math.random() * 2,
            phase: Math.random() * Math.PI * 2,
            brightness: 0.3 + Math.random() * 0.5,
        });
    }
}
initEmbers();

function drawBackground(dt) {
    // Dark gradient
    const bg = ctx.createLinearGradient(0, 0, 0, BASE_H);
    bg.addColorStop(0, '#0a0408');
    bg.addColorStop(0.7, '#1a0808');
    bg.addColorStop(1, '#2a0c04');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, BASE_W, BASE_H);

    // Floating embers
    for (const e of embers) {
        e.y -= e.speed * dt;
        e.x += Math.sin(e.phase + performance.now() * 0.001) * 0.3;
        if (e.y < -5) { e.y = BASE_H + 5; e.x = Math.random() * BASE_W; }
        const a = e.brightness * (0.5 + 0.5 * Math.sin(performance.now() * 0.003 + e.phase));
        ctx.fillStyle = `rgba(255,120,20,${a})`;
        ctx.fillRect(Math.floor(e.x), Math.floor(e.y), e.size, e.size);
    }
}

// Score display (center top)
function drawScore(camY) {
    // Distance markers on the side
    const distBlocks = Math.floor(-player.y / 50);
    if (distBlocks > 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        ctx.font = '10px Arial';
        ctx.textAlign = 'right';
        for (let d = 1; d <= distBlocks; d++) {
            const my = (d * -50) - camY;
            if (my > 0 && my < BASE_H) {
                ctx.fillRect(0, my, BASE_W, 1);
                ctx.fillText(d * 50 + 'm', BASE_W - 6, my - 2);
            }
        }
    }
}

// ─── Update HUD ───
function updateHUD() {
    document.getElementById('d-score').textContent = score;
    document.getElementById('d-hi').textContent = hiScore;
}

// ─── Start Game ───
function startGame() {
    playing = true;
    gameOver = false;
    score = 0;
    scrollY = 0;
    scrollSpeed = SCROLL_SPEED_BASE;
    particles = [];
    lavaPhase = 0;

    spawnInitialBlocks();

    // Place player on starting block
    const startBlock = blocks[0];
    player.x = startBlock.x + startBlock.w / 2 - PLAYER_W / 2;
    player.y = startBlock.y - PLAYER_H;
    player.vy = 0;
    player.vx = 0;
    player.onGround = true;
    player.facing = 1;
    player.frame = 0;
    player.frameTime = 0;

    // Lava starts below screen
    lavaY = BASE_H + 50;

    document.getElementById('overlay').classList.add('hidden');
    updateHUD();
}

// ─── Game Over ───
function endGame() {
    playing = false;
    gameOver = true;

    if (score > hiScore) {
        hiScore = score;
        localStorage.setItem('lavaHiScore', hiScore);
    }

    document.getElementById('ov-score').textContent = 'Score: ' + score;
    document.getElementById('ov-score').style.display = 'block';
    document.getElementById('ov-hi').textContent = 'Best: ' + hiScore;
    document.getElementById('ov-hi').style.display = 'block';
    document.getElementById('play-btn').textContent = 'Play Again';

    document.getElementById('overlay').classList.remove('hidden');
    updateHUD();
}

// ─── Main Loop ───
let lastTime = 0;

function gameLoop(time) {
    requestAnimationFrame(gameLoop);

    const dt = Math.min((time - lastTime) / 1000, 0.05);
    lastTime = time;

    ctx.save();
    ctx.scale(scale, scale);

    drawBackground(dt);

    if (!playing) {
        // Still draw some blocks for ambiance on title screen
        if (!gameOver) {
            if (blocks.length === 0) spawnInitialBlocks();
            const titleCamY = blocks[0].y - BASE_H + 150;
            for (const b of blocks) drawBlock(b, titleCamY);
            drawLava(titleCamY - 30);
        }
        ctx.restore();
        return;
    }

    // ─── Physics ───
    // Horizontal movement
    let moveDir = 0;
    if (keys['ArrowLeft'] || keys['KeyA'] || mobileLeft) moveDir -= 1;
    if (keys['ArrowRight'] || keys['KeyD'] || mobileRight) moveDir += 1;

    player.vx = moveDir * MOVE_SPEED;
    if (moveDir !== 0) player.facing = moveDir;

    // Walk animation
    if (Math.abs(player.vx) > 10 && player.onGround) {
        player.frameTime += dt;
        if (player.frameTime > 0.12) {
            player.frame++;
            player.frameTime = 0;
        }
    }

    // Apply gravity
    player.vy += GRAVITY * dt;

    // Move X
    player.x += player.vx * dt;
    // Clamp to screen
    if (player.x < 0) player.x = 0;
    if (player.x + PLAYER_W > BASE_W) player.x = BASE_W - PLAYER_W;

    // Move Y
    player.y += player.vy * dt;
    player.onGround = false;

    // Block collision (only check falling — land on top of blocks)
    if (player.vy >= 0) {
        for (const b of blocks) {
            const px = player.x;
            const pw = PLAYER_W;
            const py = player.y + PLAYER_H;
            const prevPy = py - player.vy * dt;

            // Check horizontal overlap
            if (px + pw > b.x + 2 && px < b.x + b.w - 2) {
                // Check if player was above block and now at or below top
                if (prevPy <= b.y + 2 && py >= b.y) {
                    player.y = b.y - PLAYER_H;
                    player.vy = 0;
                    player.onGround = true;
                    break;
                }
            }
        }
    }

    // ─── Scroll ───
    // Increase speed over time
    scrollSpeed = SCROLL_SPEED_BASE + Math.floor(score / 10) * SCROLL_SPEED_INCR;

    // Lava rises
    lavaY -= scrollSpeed * dt;
    lavaPhase += dt * 3;

    // Ambient lava particles
    if (Math.random() < dt * 8) {
        const lx = Math.random() * BASE_W;
        spawnLavaParticle(lx, lavaY);
    }

    // Camera follows player, biased upward
    const targetCamY = player.y - BASE_H * 0.4;
    const camY = targetCamY;

    // Score = how high player has gone
    const newScore = Math.max(score, Math.floor((BASE_H - 120 - player.y) / 10));
    if (newScore > score) {
        score = newScore;
        updateHUD();
    }

    // Spawn more blocks above as needed
    while (blocks[blocks.length - 1].y > camY - 200) {
        spawnBlockAbove();
    }

    // Remove blocks far below lava
    while (blocks.length > 5 && blocks[0].y > lavaY + 200) {
        blocks.shift();
    }

    // ─── Draw ───
    // Blocks
    for (const b of blocks) {
        drawBlock(b, camY);
    }

    // Lava
    drawLava(camY);

    // Particles
    drawParticles(camY, dt);

    // Player
    drawPlayer(camY);

    // Distance markers
    drawScore(camY);

    // ─── Death Check ───
    // Touched lava
    if (player.y + PLAYER_H > lavaY + 4) {
        // Spawn death particles
        for (let i = 0; i < 15; i++) {
            spawnLavaParticle(player.x + PLAYER_W / 2, player.y + PLAYER_H);
        }
        endGame();
    }

    // Fell off screen below
    if (player.y - camY > BASE_H + 50) {
        endGame();
    }

    ctx.restore();
}

// ─── Hi Score Display ───
document.getElementById('d-hi').textContent = hiScore;

requestAnimationFrame(gameLoop);
</script>
</body>
</html>
